<!-- learner template - all id's removed but HTML left in which have classes on them -->
<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Pet</title>
    <link rel="stylesheet" href="tamagotchi.css" />
  </head>
  <body>
    <header>
    </header>

    <main>
      <section class="pet-info-container">
        <input type="text" placeholder="Name your pet..." />
        <section class="pet-container">
          <p class="pet-name">Your Pet</p>
          <img class="pet-image"/>
          <p class="speech-bubble"></p>
        </section>
      </section>
      <section class="hidden">
      </section>
      <section class="status-bar">
        <section class="stat">
          <label
            >Energy <span class="stat-value"></span></label
          >
          <progress
            max="100"
            value="50"
            class="green"
          ></progress>
        </section>
      </section>

      <section>
        <button type="button" id="rest">Rest</button>
      </section>
    </main>

    <footer>
    </footer>

    <script src="tamagotchi.js"></script>
  </body>
</html>
