<!-- learner template - all id's removed but HTML left in which have classes on them -->
<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Pet</title>
    <link rel="stylesheet" href="tamagotchi.css" />
  </head>
  <body>
    <header></header>

    <main>
      <section class="pet-info-container">
        <input type="text" id="inputName" placeholder="Name your pet..." />
        <section class="pet-container">
          <p class="pet-name" id="displayName">Your Pet</p>
          <img class="pet-image" />
          <p class="speech-bubble" id="petSpeech"></p>
        </section>
      </section>
      <section class="hidden" id="gameOverContainer">
        <p id="gameOverText"></p>
        <button id="restartButton">Restart</button>
      </section>
      <section class="status-bar">
        <section class="stat">
          <label for="energyBar"
            >Energy <span class="stat-value" id="energyValue"></span
          ></label>
          <progress
            max="100"
            value="50"
            class="green"
            id="energyBar"
          ></progress>
        </section>
      </section>

      <section class="status-bar">
        <section class="stat">
          <label for="happyBar"
            >Happiness<span class="stat-value" id="happyValue"></span
          ></label>
          <progress max="100" value="50" class="green" id="happyBar"></progress>
        </section>
      </section>

      <section class="status-bar">
        <section class="stat">
          <label for="hungerBar"
            >Hunger<span class="stat-value" id="hungerValue"></span
          ></label>
          <progress
            max="100"
            value="50"
            class="green"
            id="hungerBar"
          ></progress>
        </section>
      </section>

      <section>
        <button type="button" id="rest">Rest</button>
        <button type="button" id="play">Play</button>
        <button type="button" id="feed">Feed</button>
      </section>
    </main>

    <footer></footer>

    <script src="tamagotchi.js"></script>
  </body>
</html>
